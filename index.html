<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>401隨機座位</title>

    <style>
        body { font-family: Arial; text-align: center; }
        h1 { margin-bottom: 10px; }

        .teacher-desk {
            width: 200px; height: 40px; margin: 10px auto;
            border: 2px solid black; line-height: 40px;
        }

        .container { display: flex; justify-content: center; gap: 30px; }

        .seats {
            display: grid;
            grid-template-columns: repeat(7, 60px);
            grid-template-rows: repeat(4, 60px);
            gap: 5px;
        }

        .seat {
            border: 1px solid black;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; background-color: white;
        }

        .seat.empty { background-color: lightgray; }

        .numbers {
            width: 150px;
            min-height: 200px;
        }

        textarea {
            width: 100%;
            height: 200px;
        }

        button { margin-top: 10px; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>

<h1>401隨機座位</h1>
<div class="teacher-desk">講桌</div>

<div class="container">

    <!-- 座位區 -->
    <div class="seats" id="seats"></div>

    <!-- 右側 -->
    <div>
        <!-- 可編輯座號列 -->
        <div class="numbers">
            <textarea id="studentInput"></textarea>
        </div>

        <button onclick="shuffleSeats()">換座位</button>
    </div>

</div>

<script>
const seatContainer = document.getElementById("seats");
const input = document.getElementById("studentInput");

let seatElements = [];

/* 預設名單 (可改) */
function defaultStudents() {
    let list = [];
    for (let i = 1; i <= 26; i++) {
        if (i !== 25) list.push(i);
    }
    input.value = list.join("\n");
}

/* 取得名單 */
function getStudents() {
    return input.value
        .split("\n")
        .map(s => s.trim())
        .filter(s => s !== "");
}

/* 建立座位 */
function createSeats() {
    for (let i = 0; i < 28; i++) {
        const seat = document.createElement("div");
        seat.classList.add("seat");

        const row = Math.floor(i / 7);
        const col = i % 7;

        if (col === 6 && row < 3) {
            seat.classList.add("empty");
        }

        seat.onclick = () => {
            seat.classList.toggle("empty");
        };

        seatContainer.appendChild(seat);
        seatElements.push(seat);
    }
}

/* 洗牌 */
function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

/* 換座位 */
function shuffleSeats() {
    let students = getStudents();
    shuffle(students);

    let availableSeats = seatElements.filter(seat => !seat.classList.contains("empty"));

    seatElements.forEach(seat => seat.textContent = "");

    availableSeats.forEach((seat, index) => {
        if (students[index]) {
            seat.textContent = students[index];
        }
    });
}

/* 初始化 */
defaultStudents();
createSeats();

</script>

</body>
</html>
